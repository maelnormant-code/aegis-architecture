---
- name: Clone qubes-builderv2 repository
  ansible.builtin.git:
    repo: "{{ builder_git_url }}"
    dest: "{{ builder_dir }}"
    version: "{{ builder_git_version }}"
    update: false        # do not overwrite local modifications on re-runs
  become: false

- name: Create temporary GPG keyring for signature verification
  ansible.builtin.tempfile:
    state: directory
    suffix: .gnupg
  register: git_verify_gnupghome
  when:
    - builder_git_verify | default(true) | bool
    - builder_git_verify_keys | default([]) | length > 0
  become: false

- name: Fetch trusted keys from keyserver into temporary keyring
  ansible.builtin.command:
    argv: >-
      {{
        ['gpg', '--homedir', git_verify_gnupghome.path,
         '--keyserver', builder_git_verify_keyserver,
         '--recv-keys'] + builder_git_verify_keys
      }}
  when:
    - builder_git_verify | default(true) | bool
    - builder_git_verify_keys | default([]) | length > 0
  become: false
  changed_when: false

- name: Verify git tag or commit signature
  ansible.builtin.shell:
    cmd: >
      git verify-tag "{{ builder_git_version }}" 2>/dev/null ||
      git verify-commit HEAD
    chdir: "{{ builder_dir }}"
  environment: >-
    {{
      {'GNUPGHOME': git_verify_gnupghome.path}
      if (builder_git_verify | default(true) | bool and
          builder_git_verify_keys | default([]) | length > 0)
      else {}
    }}
  when: builder_git_verify | default(true) | bool
  become: false
  changed_when: false

- name: Remove temporary GPG keyring
  ansible.builtin.file:
    path: "{{ git_verify_gnupghome.path }}"
    state: absent
  when:
    - builder_git_verify | default(true) | bool
    - builder_git_verify_keys | default([]) | length > 0
    - git_verify_gnupghome is defined
  become: false

- name: Fetch git submodules
  ansible.builtin.command:
    cmd: git submodule update --init
    chdir: "{{ builder_dir }}"
  become: false
  changed_when: false

- name: Configure Split GPG macros in ~/.rpmmacros
  ansible.builtin.blockinfile:
    path: "/home/{{ builder_user }}/.rpmmacros"
    create: true
    owner: "{{ builder_user }}"
    group: "{{ builder_user }}"
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED - qubes-builder Split GPG"
    block: |
      %__gpg /usr/bin/qubes-gpg-client-wrapper

      %__gpg_check_password_cmd   %{__gpg} \
              gpg --batch --no-verbose -u "%{_gpg_name}" -s

      %__gpg_sign_cmd /bin/sh sh -c '/usr/bin/qubes-gpg-client-wrapper \
              --batch --no-verbose \
              %{?_gpg_digest_algo:--digest-algo %{_gpg_digest_algo}} \
              -u "%{_gpg_name}" -sb %{__plaintext_filename} >%{__signature_filename}'
  when: configure_split_gpg | bool

- name: Create bind-dirs configuration directory
  ansible.builtin.file:
    path: "{{ bind_dirs_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: builder_qube_enable_docker | bool

- name: Configure bind-dirs to persist docker + containerd state
  ansible.builtin.copy:
    dest: "{{ bind_dirs_conf_dir }}/50-qubes-builder-docker.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      binds+=( '/var/lib/docker' )
      binds+=( '/var/lib/containerd' )
  become: true
  when: builder_qube_enable_docker | bool

- name: Pre-create bind-dirs backing dirs for docker + containerd
  ansible.builtin.file:
    path: "{{ bind_dirs_root }}{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /var/lib/docker
    - /var/lib/containerd
  become: true
  when: builder_qube_enable_docker | bool

- name: Ensure rc.local exists and is executable
  ansible.builtin.file:
    path: "{{ rc_local_path }}"
    state: touch
    owner: root
    group: root
    mode: "0755"
  become: true
  when: builder_qube_enable_docker | bool

# /var/lib/docker needs dev,suid for loop devices
- name: Remount /var/lib/docker with dev,suid in rc.local
  ansible.builtin.lineinfile:
    path: "{{ rc_local_path }}"
    line: "mount /var/lib/docker -o dev,suid,remount 2>/dev/null || true"
    state: present
  become: true
  when: builder_qube_enable_docker | bool

# when 'user' group membership wasn't set on the template we have to apply it in rc.local
- name: Add user to docker group via rc.local
  ansible.builtin.lineinfile:
    path: "{{ rc_local_path }}"
    line: "groups {{ builder_user }} | grep -qw docker || usermod -aG docker {{ builder_user }}"
    state: present
  become: true
  when:
    - builder_qube_enable_docker | bool
    - not (builder_qube_docker_group_in_template | bool)
