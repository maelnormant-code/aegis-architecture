---
# Configure qubes-builder-dvm (disposable template) so that the /builder
# directory is persistent across disposable restarts via bind-dirs.

- name: Create bind-dirs root for /builder
  ansible.builtin.file:
    path: "{{ bind_dirs_root }}/builder"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create bind-dirs configuration directory
  ansible.builtin.file:
    path: "{{ bind_dirs_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure bind-dirs for /builder
  ansible.builtin.copy:
    dest: "{{ bind_dirs_conf_dir }}/builder.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      binds+=('{{ builder_bind_dir }}')

- name: Ensure rc.local exists and is executable
  ansible.builtin.file:
    path: "{{ rc_local_path }}"
    state: touch
    owner: root
    group: root
    mode: "0755"

- name: Add /builder remount to rc.local (allow suid/dev inside cage)
  ansible.builtin.lineinfile:
    path: "{{ rc_local_path }}"
    line: "mount {{ builder_bind_dir }} -o dev,suid,remount"
    state: present

- name: Create /usr/local/etc/qubes-rpc directory
  ansible.builtin.file:
    path: /usr/local/etc/qubes-rpc
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install qubesbuilder.FileCopyIn RPC service
  ansible.builtin.copy:
    src: qubesbuilder.FileCopyIn
    dest: /usr/local/etc/qubes-rpc/qubesbuilder.FileCopyIn
    owner: root
    group: root
    mode: "0755"

- name: Install qubesbuilder.FileCopyOut RPC service
  ansible.builtin.copy:
    src: qubesbuilder.FileCopyOut
    dest: /usr/local/etc/qubes-rpc/qubesbuilder.FileCopyOut
    owner: root
    group: root
    mode: "0755"

# Archlinux devtools: provides 'archbuild' used by the qube executor to build
# Archlinux packages. Symlinked as qubes-x86_64-build per qubes-builder convention.
# Installed under /usr/local so it inherits into disposables via /rw/usrlocal.
- name: Clone archlinux devtools at pinned commit
  ansible.builtin.git:
    repo: "{{ archlinux_devtools_repo }}"
    dest: "{{ archlinux_devtools_src }}"
    version: "{{ archlinux_devtools_version }}"
  register: archlinux_devtools_clone
  when: builder_dvm_enable_archlinux | bool

- name: Check whether archbuild is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/archbuild
  register: archlinux_devtools_archbuild
  when: builder_dvm_enable_archlinux | bool

- name: Install archlinux devtools
  ansible.builtin.command:
    cmd: make install DESTDIR=/ PREFIX=/usr/local
    chdir: "{{ archlinux_devtools_src }}"
  when:
    - builder_dvm_enable_archlinux | bool
    - archlinux_devtools_clone is changed or not archlinux_devtools_archbuild.stat.exists
  changed_when: true

- name: Symlink archbuild as qubes-x86_64-build
  ansible.builtin.file:
    src: /usr/local/bin/archbuild
    dest: /usr/local/bin/qubes-x86_64-build
    state: link
  when: builder_dvm_enable_archlinux | bool
